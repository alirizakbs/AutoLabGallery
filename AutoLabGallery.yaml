openapi: 3.0.3
info:
  title: Araç Platformu API
  version: 1.0.0
  description: >
    Bu API, araç satış ve yönetim platformu için tasarlanmıştır.
    kullanıcı ve yönetici girişi, kayıt, şifre sıfırlama,
    kredi hesaplama, araç ve fotoğraf yönetimi, personel yönetimi, mesajlaşma,
    araç piyasa değeri sorgulama.
  contact:
    name: Ali Rıza Akbaş, Muhammet Bayram

servers:
  - url: https://api.vehicleapp.com/v1
    description: Production Server
  - url: http://localhost:3000/v1
    description: Development Server

tags:
  - name: auth
    description: Kullanıcı ve yönetici kimlik doğrulama işlemleri
  - name: credit
    description: Kredi hesaplama işlemleri
  - name: market
    description: Araç piyasa değeri sorgulama
  - name: personnel
    description: Personel yönetimi
  - name: vehicles
    description: Araç ve fotoğraf yönetimi
  - name: messages
    description: Mesajlaşma sistemi

security:
  - BearerAuth: []

paths:

  /auth/login:
    post:
      tags:
        - auth
      summary: Kullanıcı Girişi
      description: Email ve şifre ile kullanıcı girişi. Başarılı ise JWT token döner.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Giriş başarılı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        '401':
          description: Geçersiz giriş bilgileri

  /auth/register:
    post:
      tags:
        - auth
      summary: Kayıt Ol
      description: Kullanıcı ad, soyad, email, telefon ve şifre ile kayıt olur.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Kullanıcı oluşturuldu

  /auth/forgot-password:
    post:
      tags:
        - auth
      summary: Şifremi Unuttum
      description: Email üzerinden şifre sıfırlama linki gönderir.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Email gönderildi

  /auth/admin/login:
    post:
      tags:
        - auth
      summary: Yönetici Girişi
      description: Yönetici hesabı ile giriş yapılmasını sağlar.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Yönetici girişi başarılı

  /credit/calculate:
    post:
      tags:
        - credit
      summary: Kredi Hesaplama
      description: Kredi tutarı, faiz ve vade bilgisine göre aylık ve toplam ödemeyi hesaplar.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreditRequest'
      responses:
        '200':
          description: Hesaplama sonucu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditResponse'

  /market-value:
    get:
      tags:
        - market
      summary: Araç Piyasa Değeri
      description: Araç marka, model ve yılına göre piyasa değeri döndürür.
      parameters:
        - name: brand
          in: query
          schema:
            type: string
        - name: model
          in: query
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Piyasa değeri sonucu

  /personnel:
    post:
      tags:
        - personnel
      summary: Personel Ekleme
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Personnel'
      responses:
        '201':
          description: Personel eklendi

  /personnel/{personnelId}:
    put:
      tags:
        - personnel
      summary: Personel Güncelleme
      parameters:
        - name: personnelId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Personnel'
      responses:
        '200':
          description: Personel güncellendi

    delete:
      tags:
        - personnel
      summary: Personel Silme
      parameters:
        - name: personnelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Personel silindi

  /vehicles:
    post:
      tags:
        - vehicles
      summary: Araç Model Bilgileri Ekleme
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Vehicle'
      responses:
        '201':
          description: Araç oluşturuldu

  /vehicles/{vehicleId}/price:
    post:
      tags:
        - vehicles
      summary: Araç Fiyat Bilgileri Ekleme
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                price:
                  type: number
      responses:
        '201':
          description: Fiyat eklendi

  /vehicles/{vehicleId}/images:
    post:
      tags:
        - vehicles
      summary: Araç Fotoğraf Ekleme
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
      responses:
        '201':
          description: Fotoğraf eklendi

  /vehicles/{vehicleId}/images/{imageId}:
    put:
      tags:
        - vehicles
      summary: Araç Fotoğraf Güncelleme
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: string
        - name: imageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
      responses:
        '200':
          description: Fotoğraf güncellendi

    delete:
      tags:
        - vehicles
      summary: Araç Fotoğraf Silme
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: string
        - name: imageId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Fotoğraf silindi

  /messages:
    post:
      tags:
        - messages
      summary: Mesaj Gönderme
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Message'
      responses:
        '201':
          description: Mesaj gönderildi

  /messages/{messageId}:
    delete:
      tags:
        - messages
      summary: Mesaj Silme
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Mesaj silindi

components:
  securitySchemes:
    BearerAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 'JWT tabanlı kimlik doğrulama. "Authorization: Bearer <token>" eklenmeli.'

  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          example: user@email.com
        password:
          type: string
          example: 12345678

    RegisterRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        password:
          type: string

    AuthToken:
      type: object
      properties:
        token:
          type: string
        expiresIn:
          type: integer

    Personnel:
      type: object
      properties:
        name:
          type: string
        role:
          type: string

    Vehicle:
      type: object
      properties:
        brand:
          type: string
        model:
          type: string
        year:
          type: integer

    Message:
      type: object
      properties:
        receiverId:
          type: string
        message:
          type: string

    CreditRequest:
      type: object
      properties:
        amount:
          type: number
        interestRate:
          type: number
        term:
          type: integer

    CreditResponse:
      type: object
      properties:
        monthlyPayment:
          type: number
        totalPayment:
          type: number
